<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>AniaDaniel2 | 个人主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #f8f9fa;
            --secondary-color: #ffffff;
            --accent-red: #ff6b6b;
            --accent-blue: #1a73e8;
            --accent-purple: #5e35b1;
            --accent-teal: #00897b;
            --text-color: #212529;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.07);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --page-bg: #ffffff;
            --navbar-bg: rgba(255, 255, 255, 0.85);
            --navbar-scrolled-bg: rgba(255, 255, 255, 0.92);
            --navbar-border: rgba(0, 0, 0, 0.05);
            --navbar-shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
            --text-secondary: rgba(33, 37, 41, 0.85);
            --text-muted: rgba(33, 37, 41, 0.6);
            --card-hover-border: rgba(26, 115, 232, 0.2);
            --card-hover-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-color: #1a1a2e;
                --secondary-color: #16213e;
                --accent-red: #ff6b6b;
                --accent-blue: #64b5f6;
                --accent-purple: #b39ddb;
                --accent-teal: #4db6ac;
                --text-color: #e8eaed;
                --glass-bg: rgba(22, 25, 40, 0.88);
                --glass-border: rgba(255, 255, 255, 0.07);
                --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
                --page-bg: #0b0d17;
                --navbar-bg: rgba(11, 13, 27, 0.82);
                --navbar-scrolled-bg: rgba(11, 14, 28, 0.88);
                --navbar-border: rgba(255, 255, 255, 0.04);
                --navbar-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
                --text-secondary: rgba(226, 228, 235, 0.82);
                --text-muted: rgba(200, 204, 220, 0.55);
                --card-hover-border: rgba(84, 167, 244, 0.24);
                --card-hover-shadow: 0 14px 36px rgba(0, 0, 0, 0.48);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--page-bg);
            color: var(--text-color);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            padding-top: 80px;
            transition: background-color 0.35s ease, color 0.35s ease;
        }

        .noise::before {
            display: none;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.2rem 2rem;
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            background: var(--navbar-bg);
            box-shadow: var(--navbar-shadow);
            border-bottom: 1px solid var(--navbar-border);
            z-index: 10000;
            transition: background-color 0.35s ease, backdrop-filter 0.35s ease, -webkit-backdrop-filter 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease, padding 0.3s ease;
            display: flex;
            justify-content: center;
        }

        .navbar.scrolled {
            padding: 0.8rem 2rem;
            background: var(--navbar-scrolled-bg);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            position: relative;
            padding: 0.5rem 0;
            transition: color 0.3s ease;
            min-width: 120px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .nav-links a:first-child {
            color: var(--text-color);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-blue);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .hero {
            text-align: center;
            padding: 3rem 1rem;
            margin-bottom: 3rem;
            position: relative;
        }

        .avatar-container {
            display: inline-block;
            position: relative;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple)) border-box;
            padding: 4px;
            box-shadow: var(--glass-shadow);
            transition: box-shadow 0.35s ease;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            color: var(--text-color);
            transition: color 0.35s ease;
        }

        .section-title {
            text-align: center;
            font-size: 2.0rem;
            margin-bottom: 3rem;
            font-weight: 700;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            transition: color 0.35s ease;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            border-radius: 4px;
            transition: background 0.35s ease;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .project-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.8rem;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--glass-shadow);
            transition: background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--card-hover-shadow);
            border-color: var(--card-hover-border);
        }

        .project-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1.2rem;
            transition: color 0.35s ease;
        }

        .project-description {
            line-height: 1.8;
            margin-top: 1.2rem;
            color: var(--text-secondary);
            transition: color 0.35s ease;
        }

        .project-description p {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }

        .project-description p::before {
            content: "•";
            color: var(--accent-blue);
            margin-right: 10px;
            font-size: 1.2rem;
            transition: color 0.35s ease;
        }

        .project-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .project-link:hover {
            color: var(--accent-purple);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: 8px 8px 0 0;
        }
        
        .project-card.accent-blue::before {
            background: var(--accent-blue);
        }
        
        .project-card.accent-red::before {
            background: var(--accent-red);
        }
        
        .project-card.accent-purple::before {
            background: var(--accent-purple);
        }
        
        .project-card.accent-teal::before {
            background: var(--accent-teal);
        }

        footer {
            margin-top: 6rem;
            padding: 3rem 0 2rem;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            transition: border-color 0.35s ease;
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .copyright {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            transition: color 0.35s ease;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--accent-red);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease;
            transition: background-color 0.35s ease, border-color 0.35s ease;
        }

        .error-message h3 {
            color: var(--accent-red);
            margin-bottom: 1rem;
            transition: color 0.35s ease;
        }

        .error-message p {
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            transition: color 0.35s ease;
        }

        .retry-button {
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            margin-top: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .retry-button:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }
            
            .navbar {
                padding: 1rem;
                backdrop-filter: blur(18px) saturate(200%);
                -webkit-backdrop-filter: blur(18px) saturate(200%);
            }
            
            .navbar.scrolled {
                backdrop-filter: blur(22px) saturate(200%);
                -webkit-backdrop-filter: blur(22px) saturate(200%);
            }
            
            .nav-links {
                gap: 1.5rem;
                width: 100%;
                justify-content: space-around;
            }
            
            .nav-links a {
                min-width: auto;
                padding: 0.5rem;
                font-size: 1rem;
            }
            
            .projects {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 1.5rem;
            }
            
            .section-title {
                font-size: 1.7rem;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.8rem;
            }
            
            .nav-links {
                gap: 0.8rem;
            }
            
            .nav-links a {
                font-size: 0.9rem;
                min-width: 30%;
                padding: 0.5rem 0.2rem;
            }
            
            .avatar {
                width: 120px;
                height: 120px;
            }
            
            .section-title {
                font-size: 1.5rem;
            }
            
            .copyright {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="https://github.com/AniaDaniel2">我的项目</a>
            <a href="zk.html">倒计时（等待重构）</a>
            <a href="gxrz.html">更新日志</a>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
            <div class="avatar-container">
                <img src="https://avatars.githubusercontent.com/u/130365608?v=4" alt="头像" class="avatar">
            </div>
            <h1>AniaDaniel2</h1>
        </section>

        <h2 class="section-title">我的项目</h2>
        
        <section class="projects" id="projects-container">
        </section>

        <footer>
            <div class="footer-content">
                <div class="copyright">
                    <span>© 2024-2026 AniaDaniel2</span> 
                </div>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetchProjectData();
            
            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    document.querySelector('.navbar').classList.add('scrolled');
                } else {
                    document.querySelector('.navbar').classList.remove('scrolled');
                }
            });
        });
        
        function fetchProjectData() {
            fetch('xm.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('项目文件不存在，请联系网站管理员');
                    }
                    return response.json();
                })
                .then(data => loadProjects(data))
                .catch(error => handleError(error));
        }
        
        function loadProjects(data) {
            const container = document.getElementById('projects-container');
            
            container.innerHTML = '';
            
            if (!data || !data.projects || !Array.isArray(data.projects)) {
                throw new Error('项目格式不正确，请联系网站管理员');
            }
            
            data.projects.forEach(project => {
                const card = document.createElement('div');
                card.className = `project-card ${project.borderColor}`;
                card.id = project.id;
                
                const title = document.createElement('h3');
                title.textContent = project.title;
                
                if (project.id === 'alist-card') {
                    title.style.color = 'var(--accent-red)';
                }

                const description = document.createElement('div');
                description.className = 'project-description';
                
                project.description.forEach(line => {
                    const p = document.createElement('p');
                    p.textContent = line;
                    description.appendChild(p);
                });
                
                const link = document.createElement('a');
                link.className = 'project-link';
                link.href = project.link;
                link.target = '_blank';
                link.textContent = '查看项目';
                
                card.appendChild(title);
                card.appendChild(description);
                card.appendChild(link);
                
                container.appendChild(card);
            });
        }
        
        function handleError(error) {
            console.error('加载项目数据失败:', error);
            const container = document.getElementById('projects-container');
            container.innerHTML = `
                <div class="error-message">
                    <h3>加载项目数据失败</h3>
                    <p>错误原因: ${error.message}</p>
                    <p>请确保同目录下存在项目文件</p>
                    <p>文件格式应包含有效的项目数组</p>
                    <button class="retry-button" onclick="fetchProjectData()">
                        <i class="fas fa-sync-alt"></i> 重新尝试
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
